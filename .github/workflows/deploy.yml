name: Deploy to Streamlit Cloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        # テスト用スクリプト（簡易版）
        echo "Running basic syntax check..."
        python -m py_compile app.py
        python -m py_compile utils/claude_api.py
        python -m py_compile utils/data_manager.py
    
    - name: Deploy to Streamlit Cloud
      if: github.ref == 'refs/heads/main'
      run: |
        echo "✅ Deploy to Streamlit Cloud"
        echo "Streamlit Cloud automatically deploys on every push to main branch"
        echo "Monitor deployment at: https://gavi-minobe.streamlit.app"
